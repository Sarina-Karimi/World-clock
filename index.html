<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World clock</title>
    <link rel="stylesheet" href="src/style.css" >
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-10-year-range.min.js"></script>
</head>
<body>
    <div class="container">
         <h1>World clock</h1>
        <select  id="city">
            <option value="">Select a city..</option>
            <option value="current">My location</option>
            <option value="America/Los_Angeles">Los Angeles</option>
            <option value="Europe/Paris">Paris</option>
        </select>

        <div class="cities">
        <div class="city" id="los-angeles">
            <div>
            <h2>Los Angeles </h2>
            <div class="date"></div>
            </div>
            <div class="time"></div>
        </div>                 
        <div class="city" id="paris">
            <div>
            <h2>Paris </h2>
            <div class="date"></div>
            </div>
            <div class="time"></div>
        </div>  
        </div>
    </div>

    <footer>This project was coded with 🤍 by 
        <a href="https://github.com/Sarina-Karimi">Sarina Karimi</a>
        and is open-sourced on 
        <a href="https://github.com/Sarina-Karimi/World-clock">Github</a>
        and
        <a href="https://app.netlify.com/projects/world-clock-project-sarina/overview">Netlify</a>
    </footer>
    <script src="src/index.js"></script>
</body>
</html>
