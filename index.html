    <title>World clock</title>
    <link rel="stylesheet" href="src/style.css" >
</head>
<body>
    <div class="container">
         <h1>World clock</h1>
        <select name="" id="">
            <option value="">Select a city..</option>

        <div class="city">
            <div>
            <h2>Los Angeles </h2>

            </div>
            <div class="time">1:48:20 <small>AM</small></div>
        </div>                 
        <div class="city">
            <div>
            <h2>Paris </h2>
            <div class="date">August 15th 2025</div>
            </div>
            <div class="time">1:48:20  <small>AM</small></div>
        </div>  
    </div>
